services:
  db_test:
    image: postgres:16
    container_name: photogallery_db_test
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: photogallery_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d photogallery_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_test_data:/var/lib/postgresql/data

volumes:
  pg_test_data:
